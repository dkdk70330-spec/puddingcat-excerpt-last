<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PuddingCat caveduck excerpt</title>
<style>
  :root{
    color-scheme:light;
    --page:#eef0f3;
    --surface:#ffffff;
    --surface-2:#f5f6f8;
    --ink:#17191d;
    --muted:#747b86;
    --line:#dfe3e8;
    --accent:#36d49a;
    --accent-ink:#0c3427;
    --preview-text:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--page);color:var(--ink);font-family:Pretendard,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  button,input{font:inherit}
  button{color:inherit}
  button:focus-visible,input:focus-visible{outline:3px solid rgba(54,212,154,.35);outline-offset:2px}
  .stage{min-height:100vh;display:flex;justify-content:center;padding:12px;background:radial-gradient(circle at 50% -10%,#fff 0,#eef0f3 46%,#e5e8ec 100%)}
  .app{width:min(448px,100%);min-height:calc(100vh - 24px);display:flex;flex-direction:column;gap:10px}

  .topbar{height:48px;display:flex;align-items:center;gap:8px;padding:0 2px}
  .identity{display:flex;align-items:center;gap:9px;min-width:0;margin-right:auto}
  .identity-mark{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--ink);color:#fff;font-weight:900;font-size:12px;letter-spacing:-.5px}
  .identity-copy{min-width:0}
  .identity-title{font-size:14px;font-weight:900;letter-spacing:-.3px;line-height:1.1}
  .identity-sub{font-size:10px;color:var(--muted);margin-top:2px}
  .top-action{height:32px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.7);padding:0 10px;font-size:12px;font-weight:800;cursor:pointer}
  .top-action.icon{width:32px;padding:0;font-size:17px;font-weight:500}
  .top-action.export{background:var(--ink);border-color:var(--ink);color:#fff;padding:0 13px}

  .canvas-shell{background:var(--surface);border:1px solid rgba(18,22,29,.06);border-radius:20px;padding:10px;box-shadow:0 12px 30px rgba(38,45,55,.09)}
  .canvas-toolbar{display:flex;align-items:center;gap:8px;height:34px;padding:0 2px 8px}
  .canvas-label{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-right:auto}
  .ratios{display:flex;gap:4px;align-items:center}
  .ratio{height:24px;min-width:34px;padding:0 7px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#606873;font-size:10px;font-weight:800;cursor:pointer}
  .ratio.active{background:var(--ink);border-color:var(--ink);color:#fff}

  .preview-wrap{width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;border-radius:14px;background:#06152c;background-size:cover;background-position:center}
  #starCanvas{position:absolute;inset:0;width:100%;height:100%}
  .shade{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s ease;pointer-events:none}
  .preview-copy{position:absolute;left:28px;right:28px;top:0;color:var(--preview-text);font-family:Batang,"KoPub Batang","NanumMyeongjo",serif;font-size:16px;font-weight:700;line-height:1.82;letter-spacing:0;text-shadow:none;white-space:pre-line}
  .preview-copy .excerpt-segment{display:block;width:100%;white-space:pre-line;color:inherit;font:inherit;line-height:inherit;letter-spacing:inherit;text-align:inherit}
  .preview-copy .excerpt-segment + .excerpt-segment{margin-top:1.82em}
  .author{position:absolute;left:22px;bottom:20px;color:rgba(235,240,246,.7);font-size:11px;font-weight:700;letter-spacing:-.2px}
  .brand{position:absolute;right:22px;bottom:20px;color:rgba(235,240,246,.82);font-size:10px;font-weight:900;letter-spacing:1.1px}

  .dock{background:var(--surface);border:1px solid rgba(18,22,29,.06);border-radius:18px;overflow:hidden;box-shadow:0 10px 24px rgba(38,45,55,.06)}
  .dock-tabs{display:grid;grid-template-columns:repeat(4,1fr);padding:5px;background:var(--surface-2);border-bottom:1px solid var(--line)}
  .dock-tab{height:34px;border:0;border-radius:9px;background:transparent;color:#7a818c;font-size:12px;font-weight:800;cursor:pointer}
  .dock-tab.active{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(30,35,42,.08)}
  .dock-panel{display:none;padding:12px}
  .dock-panel.active{display:block}
  .panel-line{display:flex;align-items:center;gap:8px;min-height:38px}
  .panel-line + .panel-line{margin-top:8px}
  .label{flex:0 0 auto;color:#68717d;font-size:11px;font-weight:900;letter-spacing:-.1px}
  .spacer{margin-left:auto}
  .mini-label{font-size:10px;color:#8a929d;font-weight:700}
  .compact-card{padding:9px;border:1px solid var(--line);border-radius:12px;background:#fafbfc}
  .compact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .bg-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,34px));gap:6px;width:100%;overflow:visible;padding:3px 3px 6px;justify-content:start}
  .bg-strip::-webkit-scrollbar{display:none}
  .bg-item,.bg-nav{width:34px;height:34px;border:0;border-radius:9px;position:relative;cursor:pointer;background:#e8ebef;box-shadow:inset 0 0 0 1px rgba(10,15,22,.06)}
  .bg-item.active::after{content:"";position:absolute;inset:-3px;border:2px solid var(--ink);border-radius:11px;pointer-events:none}
  .bg-upload{background:#fff;border:1px dashed #99a2ad;box-shadow:none;display:grid;place-items:center}
  .bg-upload svg{width:16px;height:16px;stroke:#6d7682;stroke-width:1.8;fill:none}
  .bg-custom{display:grid;place-items:center;background:#fff}
  .bg-custom svg{width:17px;height:17px;fill:#6846d8}
  .bg-nav{display:grid;place-items:center;background:#eef1f4;color:#69727d;font-size:17px}
  .bg-preset[data-bg="paper"]{background:linear-gradient(135deg,#d5ccb9,#f0e8dd)}
  .bg-preset[data-bg="parchment"]{background:linear-gradient(135deg,#b69c70,#e8d7b4)}
  .bg-preset[data-bg="mist"]{background:linear-gradient(135deg,#708695,#e3ebef)}
  .bg-preset[data-bg="pearl"]{background:linear-gradient(135deg,#8a93a0,#eef2f4)}
  .bg-preset[data-bg="forest"]{background:linear-gradient(135deg,#0f221c,#6d8b64)}
  .bg-preset[data-bg="meadow"]{background:linear-gradient(135deg,#445264,#d4d1bc)}
  .bg-preset[data-bg="shore"]{background:linear-gradient(135deg,#47556b,#d7c3b2)}
  .bg-preset[data-bg="harbor"]{background:linear-gradient(135deg,#3c465b,#aeb7c1)}
  .bg-preset[data-bg="butterfly"]{background:linear-gradient(135deg,#646986,#efe8f4)}
  .bg-preset[data-bg="bubbles"]{background:linear-gradient(135deg,#556f7f,#dce7ef)}
  .bg-preset[data-bg="dawn"]{background:linear-gradient(135deg,#4a5669,#e9d9c8)}
  .bg-preset[data-bg="lavender"]{background:linear-gradient(135deg,#5a6085,#ddd7ef)}
  .bg-preset[data-bg="sage"]{background:linear-gradient(135deg,#47615a,#dce7e0)}
  .bg-preset[data-bg="moon"]{background:linear-gradient(135deg,#121a2c,#68799a)}
  .bg-preset[data-bg="blossom"]{background:linear-gradient(135deg,#756372,#f2dde1)}
  .bg-preset[data-bg="rain"]{background:linear-gradient(135deg,#536171,#b9c7d1)}
  .bg-preset[data-bg="firefly"]{background:linear-gradient(135deg,#213229,#6c8570)}
  .bg-preset[data-bg="garden"]{background:linear-gradient(135deg,#48515d,#d2c8bd)}
  .bg-preset[data-bg="dusklake"]{background:linear-gradient(135deg,#2d3854,#8295aa)}
  .bg-preset[data-bg="snow"]{background:linear-gradient(135deg,#9cabbb,#eff4f7)}
  .bg-photo{background-size:cover;background-repeat:no-repeat;overflow:hidden}
  .bg-editor{margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:11px;background:#fafbfc}
  .bg-editor.hidden{display:none}
  .bg-editor-head,.bg-editor-body{display:flex;align-items:center;gap:7px}
  .bg-editor-head{margin-bottom:7px}
  .mode-pills{display:flex;gap:5px}
  .mode-pill{height:25px;padding:0 9px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#6c7480;font-size:10px;font-weight:800;cursor:pointer}
  .mode-pill.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .bg-hint{margin-left:auto;font-size:9px;color:#9299a3}
  .picker-stack{display:flex;align-items:center;gap:7px;flex:1}
  .picker-arrow{font-size:15px;color:#98a0aa}
  .color-chip{width:29px;height:29px;border-radius:8px;position:relative;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .color-chip input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .bg-apply{margin-left:auto;height:29px;padding:0 12px;border:0;border-radius:8px;background:var(--accent);color:var(--accent-ink);font-size:10px;font-weight:900;cursor:pointer}
  .direction-row{display:flex;align-items:center;gap:7px;margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
  .direction-row.hidden{display:none}
  .direction-label{font-size:9px;color:#858d98;font-weight:800;white-space:nowrap}
  .direction-options{display:grid;grid-template-columns:repeat(8,25px);gap:4px;margin-left:auto}
  .direction-btn{width:25px;height:25px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#737b86;font-size:13px;line-height:1;display:grid;place-items:center;cursor:pointer}
  .direction-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}

  .toggle{position:relative;width:36px;height:21px;display:inline-block;cursor:pointer}
  .toggle input{position:absolute;opacity:0;pointer-events:none}
  .toggle-track{position:absolute;inset:0;border-radius:999px;background:#dce1e6;transition:.2s}
  .toggle-track::after{content:"";position:absolute;left:3px;top:3px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.18);transition:.2s}
  .toggle input:checked + .toggle-track{background:var(--ink)}
  .toggle.yellow input:checked + .toggle-track{background:#ffc400}
  .toggle input:checked + .toggle-track::after{transform:translateX(15px)}

  .segmented,.weight-options{display:flex;gap:5px;flex-wrap:wrap}
  .seg{height:29px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#69727e;padding:0 9px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap}
  .seg.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .stepper{display:flex;align-items:center;gap:7px}
  .round-btn{width:28px;height:28px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#59616c;font-size:16px;display:grid;place-items:center;cursor:pointer}
  .size-value{width:19px;text-align:center;font-size:12px;font-weight:900}
  .color-options,.align-options,.dialogue-colors{display:flex;align-items:center;gap:6px}
  .color-dot,.custom-text-color{width:29px;height:29px;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;background:#fff;color:#111;font-family:serif;font-size:12px;font-weight:900;cursor:pointer;position:relative}
  .color-dot[data-color="#000000"]{background:#111;color:#fff}
  .color-dot.active::after,.custom-text-color.active::after{content:"";position:absolute;inset:-3px;border:2px solid var(--accent);border-radius:10px}
  .custom-text-color{overflow:visible}
  .custom-text-color input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .custom-text-color span{mix-blend-mode:difference;color:#fff}
  .align-btn{width:29px;height:29px;border:1px solid var(--line);border-radius:8px;background:#fff;display:grid;place-items:center;cursor:pointer}
  .align-btn.active{background:var(--ink);border-color:var(--ink)}
  .align-lines{width:14px;display:grid;gap:3px}
  .align-lines i{display:block;height:2px;border-radius:3px;background:#7b8490}
  .align-btn.active .align-lines i{background:#fff}
  .align-btn[data-align="left"] .align-lines i:nth-child(2){width:9px}
  .align-btn[data-align="center"] .align-lines i:nth-child(2){width:9px;justify-self:center}
  .align-btn[data-align="right"] .align-lines i:nth-child(2){width:9px;justify-self:end}

  .more{border:0;background:transparent}
  .more-toggle{width:100%;height:31px;border:1px dashed #cbd1d8;border-radius:9px;background:#fafbfc;color:#6a7380;font-size:10px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .chev{width:6px;height:6px;border-right:1px solid currentColor;border-bottom:1px solid currentColor;transform:rotate(45deg) translateY(-2px);transition:.2s}
  .more.open .chev{transform:rotate(225deg) translate(-1px,-1px)}
  .more-panel{display:none;padding-top:8px}
  .more.open .more-panel{display:block}
  .advanced-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .advanced-row{min-height:54px;border:1px solid var(--line);border-radius:10px;background:#fafbfc;padding:7px;display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:6px}
  .advanced-control{width:100%;display:flex;justify-content:flex-end}
  .unset-color{height:27px;padding:0 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#4f5762;font-size:10px;font-weight:800;cursor:pointer;position:relative}
  .dialogue-color-dot{width:27px;height:27px;border-radius:8px;border:1px solid #d5b000;background:#ffc400;cursor:pointer;position:relative}
  .unset-color.active::after,.dialogue-color-dot.active::after{content:"";position:absolute;inset:-3px;border:2px solid var(--accent);border-radius:10px}
  .keyword-block{margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
  .keyword-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .add-keyword{height:27px;padding:0 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#3e4650;font-size:10px;font-weight:900;cursor:pointer}
  .replacement-list{display:grid;gap:6px}
  .replacement-row{display:grid;grid-template-columns:minmax(0,1fr) 16px minmax(0,1fr);align-items:center;gap:4px}
  .replacement-row input{min-width:0;height:31px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#20242a;padding:0 9px;font-size:10px;outline:none}
  .replace-arrow{text-align:center;color:#9ca3ad;font-size:13px}

  .share-sheet{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(9,12,17,.55);padding:16px;z-index:30}
  .share-sheet.open{display:flex}
  .share-sheet-panel{width:min(420px,100%);border-radius:18px;background:#fff;padding:16px;box-shadow:0 22px 50px rgba(0,0,0,.25)}
  .share-sheet-title{font-size:15px;font-weight:900;margin:0 0 4px}
  .share-sheet-copy{font-size:11px;color:var(--muted);margin:0 0 13px}
  .share-actions{display:grid;gap:8px}
  .share-action{height:42px;border:1px solid var(--line);border-radius:11px;background:#fff;color:#30363e;font-size:12px;font-weight:900;cursor:pointer}
  .share-action.primary{background:var(--ink);border-color:var(--ink);color:#fff}
  .share-action.secondary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,10px);padding:9px 13px;border-radius:999px;background:#16191e;color:#fff;font-size:11px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap;z-index:40}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  @media (max-width:390px){
    .stage{padding:8px}
    .app{min-height:calc(100vh - 16px)}
    .top-action{padding:0 8px}
    .top-action.export{padding:0 10px}
    .preview-copy{left:23px;right:23px}
    .author{left:18px;bottom:17px}
    .brand{right:18px;bottom:17px}
  }
</style>
</head>
<body>
<div class="stage">
  <main class="app" aria-label="CAVEDUCK 카드 편집기">
    <header class="topbar">
      <div class="identity">
        <div class="identity-mark">PC</div>
        <div class="identity-copy">
          <div class="identity-title">PuddingCat</div>
          <div class="identity-sub">caveduck excerpt</div>
        </div>
      </div>
      <button class="top-action icon" id="reset" aria-label="초기화">↻</button>
      <button class="top-action" id="cancel">취소</button>
      <button class="top-action export" id="share">내보내기</button>
    </header>

    <section class="canvas-shell">
      <div class="canvas-toolbar">
        <span class="canvas-label">케이브덕 발췌기</span>
        <div class="ratios" role="group" aria-label="이미지 비율">
          <button class="ratio active" data-ratio="1/1">1:1</button>
          <button class="ratio" data-ratio="2/3">2:3</button>
          <button class="ratio" data-ratio="3/2">3:2</button>
          <button class="ratio" data-ratio="3/4">3:4</button>
          <button class="ratio" data-ratio="4/3">4:3</button>
        </div>
      </div>
      <div class="preview-wrap" id="preview">
        <canvas id="starCanvas" aria-hidden="true"></canvas>
        <div class="shade" id="shade"></div>
        <div class="preview-copy" id="previewText">TEST</div>
        <div class="author">캐릭터이름 - 제작자</div>
        <div class="brand">caveduck</div>
      </div>
    </section>

    <section class="dock" aria-label="편집 도구">
      <div class="dock-tabs" role="tablist">
        <button class="dock-tab active" data-tab="background" role="tab" aria-selected="true">배경</button>
        <button class="dock-tab" data-tab="text" role="tab" aria-selected="false">폰트 공통</button>
        <button class="dock-tab" data-tab="advanced" role="tab" aria-selected="false">폰트 설정</button>
        <button class="dock-tab" data-tab="modify" role="tab" aria-selected="false">수정</button>
      </div>

      <div class="dock-panel active" data-panel="background">
        <div class="panel-line">
          <span class="label">배경 소스</span>
          <button class="bg-item bg-upload" id="openImageButton" aria-label="갤러리 또는 파일 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 14l2.7-2.9a1 1 0 0 1 1.46 0L16 15"></path><circle cx="9" cy="9" r="1.4"></circle></svg>
          </button>
          <button class="bg-item bg-custom active" id="customBackgroundButton" aria-label="사용자 색상 배경">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 0 18c1.6 0 2.63-.82 2.63-2 0-.47-.18-.9-.5-1.27-.28-.34-.44-.6-.44-.9 0-.55.45-1 1-1h1.53A4.78 4.78 0 0 0 21 11.05 8.05 8.05 0 0 0 12 3Z"></path></svg>
          </button>
          <span class="mini-label">파일 / 직접 색상</span>
          <span class="spacer"></span>
          <span class="mini-label">어둡게</span>
          <label class="toggle" aria-label="배경 어둡게">
            <input id="darkToggle" type="checkbox" />
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="bg-strip" role="list" aria-label="배경 프리셋">
          <button class="bg-item bg-preset" data-bg="paper" aria-label="페이퍼"></button>
          <button class="bg-item bg-preset" data-bg="parchment" aria-label="양피지"></button>
          <button class="bg-item bg-preset" data-bg="mist" aria-label="미스트"></button>
          <button class="bg-item bg-preset" data-bg="pearl" aria-label="펄"></button>
          <button class="bg-item bg-preset" data-bg="forest" aria-label="숲"></button>
          <button class="bg-item bg-preset" data-bg="meadow" aria-label="초원"></button>
          <button class="bg-item bg-preset" data-bg="shore" aria-label="쇼어"></button>
          <button class="bg-item bg-preset" data-bg="harbor" aria-label="하버"></button>
          <button class="bg-item bg-preset" data-bg="butterfly" aria-label="버터플라이"></button>
          <button class="bg-item bg-preset" data-bg="bubbles" aria-label="버블"></button>
          <button class="bg-item bg-preset" data-bg="dawn" aria-label="새벽빛"></button>
          <button class="bg-item bg-preset" data-bg="lavender" aria-label="라벤더"></button>
          <button class="bg-item bg-preset" data-bg="sage" aria-label="세이지"></button>
          <button class="bg-item bg-preset" data-bg="moon" aria-label="문라이트"></button>
          <button class="bg-item bg-preset" data-bg="blossom" aria-label="블로섬"></button>
          <button class="bg-item bg-preset" data-bg="rain" aria-label="비내리는 창"></button>
          <button class="bg-item bg-preset" data-bg="firefly" aria-label="반딧불"></button>
          <button class="bg-item bg-preset" data-bg="garden" aria-label="가든"></button>
          <button class="bg-item bg-preset" data-bg="dusklake" aria-label="호수 저녁"></button>

<script>

(() => {

  const presets = {
    paper: ['#a48f72','#d8cdb9','#f1eadf'],

    harbor: ['#334056','#67758c','#a9b4c0'],
    butterfly: ['#565d7c','#a39fc3','#efe8f4'],
    bubbles: ['#506878','#88a9bd','#dce8ef'],
    dawn: ['#3f4b60','#b89d98','#eadbc7'],
    lavender: ['#50577d','#9a92bf','#ddd8ef'],
    sage: ['#3d5751','#86a39a','#d9e4de'],
    moon: ['#0f1729','#27384f','#68789a'],
    blossom: ['#665864','#bea1af','#f1dde1'],
    rain: ['#485463','#8195a6','#c4d0d8'],
    firefly: ['#19261f','#465d4a','#869b79'],
    garden: ['#474f5d','#8d8b88','#d2c8bd'],
    dusklake: ['#25324a','#4c6481','#8ca1b5'],
    snow: ['#96a6b8','#d8e2e8','#f1f5f7']
  };

  const builtinPhotos = [{"id":"lake-pink","label":"호수 노을","src":"./assets/backgrounds/lake-sunset.png","position":"50% 56%"},{"id":"butterfly-field","label":"나비 들판","src":"./assets/backgrounds/butterfly-field.png","position":"28% 52%"},{"id":"vase-peony","label":"화병 꽃","src":"./assets/backgrounds/flower-vase.png","position":"24% 56%"},{"id":"bird-dawn","label":"새벽의 새","src":"./assets/backgrounds/bird-at-dawn.png","position":"28% 50%"},{"id":"misty-path","label":"안개 오솔길","src":"./assets/backgrounds/misty-path.png","position":"50% 50%"},{"id":"rainy-window","label":"비 오는 창가","src":"./assets/backgrounds/rainy-window.png","position":"52% 52%"},{"id":"flower-meadow","label":"꽃 초원","src":"./assets/backgrounds/wildflower-meadow.png","position":"50% 72%"},{"id":"desk-window","label":"창가 책상","src":"./assets/backgrounds/cozy-window-desk.png","position":"58% 58%"},{"id":"pastel-beach","label":"파스텔 해변","src":"./assets/backgrounds/pastel-beach.png","position":"50% 56%"},{"id":"mist-lake","label":"안개 호수","src":"./assets/backgrounds/misty-lake.png","position":"50% 54%"}].reduce((acc, item) => { acc[item.id] = item; return acc; }, {});


  let imageUrl = null;
  let imagePosition = "50% 50%";
  let state = {
    bgMode:'gradient',
    bg:'mist',
    customMode:'gradient',
    gradient:['#6366f1','#a855f7'],
    gradientDirection:'down',
    solid:'#6366f1',
    ratio:'1/1',
    dark:false,
    font:'batang',
    size:3,
    color:'#ffffff',
    align:'left',
    weight:700,
    italic:false,
    quotes:true,
    dialogueColor:'inherit'
  };
  const incomingExcerptData = Array.isArray(window.__CAVEDUCK_EXCERPT_DATA__)
    ? window.__CAVEDUCK_EXCERPT_DATA__
    : [];

  const originalSegments = incomingExcerptData.length
    ? incomingExcerptData
        .map(item => ({
          type: item && item.type === 'dialogue' ? 'dialogue' : 'narration',
          text: String(item && item.text != null ? item.text : '').trim()
        }))
        .filter(item => item.text)
    : [{ type:'narration', text:text.textContent.trim() }];

  const dialogueQuotePairs = new Map([
    ['"', '"'], ['“', '”'], ['„', '”'], ['「', '」'], ['『', '』'],
    ['‘', '’'], ['«', '»'], ['‹', '›'], ['《', '》'], ['〈', '〉'],
    ['〝', '〞'], ['❝', '❞']
  ]);

  function getReplacementPairs(){
    return Array.from(document.querySelectorAll('.replacement-row'))
      .map(row => ({
        from: row.querySelector('.replace-from').value,
        to: row.querySelector('.replace-to').value
      }))
      .filter(pair => pair.from);
  }

  function applyReplacementPairs(value, pairs){
    return pairs.reduce((output, pair) => output.split(pair.from).join(pair.to), value);
  }

  function stripOuterDialogueQuotes(value){
    const trimmed = String(value || '').trim();
    if (trimmed.length < 2) return trimmed;
    const expectedClose = dialogueQuotePairs.get(trimmed[0]);
    return expectedClose && trimmed.endsWith(expectedClose)
      ? trimmed.slice(1, -1).trim()
      : trimmed;
  }

  function renderExcerpt(){
    const pairs = getReplacementPairs();
    const fragment = document.createDocumentFragment();

    originalSegments.forEach(segment => {
      const item = document.createElement('span');
      item.className = `excerpt-segment ${segment.type}`;

      let value = applyReplacementPairs(segment.text, pairs);
      if (segment.type === 'dialogue' && !state.quotes) {
        value = stripOuterDialogueQuotes(value);
      }

      item.textContent = value;
      item.style.fontStyle = segment.type === 'narration' && state.italic ? 'italic' : 'normal';
      item.style.color = segment.type === 'dialogue' && state.dialogueColor !== 'inherit'
        ? state.dialogueColor
        : '';

      fragment.appendChild(item);
    });

    text.replaceChildren(fragment);
    schedulePreviewTextLayout();
  }

  function mulberry32(seed){
    return function(){
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  function setChipBackgrounds(){
    gradientStartChip.style.background = gradientStartInput.value;
    gradientEndChip.style.background = gradientEndInput.value;
  }

  function renderBackgroundEditor(){
    const customVisible = state.bgMode === 'gradient' || state.bgMode === 'solid';
    backgroundEditor.classList.toggle('hidden', !customVisible);
    document.querySelectorAll('#backgroundModePills .mode-pill').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.customMode === state.customMode);
    });

    const solidMode = state.customMode === 'solid';
    gradientEndChip.style.display = solidMode ? 'none' : '';
    secondArrow.style.display = solidMode ? 'none' : '';
    gradientDirectionRow.classList.toggle('hidden', solidMode);
    document.querySelectorAll('#gradientDirectionButtons .direction-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.direction === state.gradientDirection);
    });
    bgHint.textContent = solidMode ? '단색을 고르고 적용하세요' : '차분한 색과 방향을 정하세요';
  }

  function setActiveBackgroundButton(target){
    document.querySelectorAll('.bg-item').forEach(btn => btn.classList.remove('active'));
    if (target) target.classList.add('active');
  }

  function revokeIfBlob(url){
    if (url && typeof url === 'string' && url.startsWith('blob:')) URL.revokeObjectURL(url);
  }

  function parsePositionPercent(position){
    const [rawX = '50%', rawY = '50%'] = String(position || '50% 50%').split(/\s+/);
    const toPercent = (value, axis) => {
      const lower = String(value).toLowerCase();
      if (lower.endsWith('%')) return Math.max(0, Math.min(1, parseFloat(lower) / 100 || 0.5));
      if (lower === 'left' || lower === 'top') return 0;
      if (lower === 'right' || lower === 'bottom') return 1;
      if (lower === 'center') return 0.5;
      const numeric = parseFloat(lower);
      if (Number.isFinite(numeric)) return axis === 'x' ? numeric : numeric;
      return 0.5;
    };
    return [toPercent(rawX, 'x'), toPercent(rawY, 'y')];
  }

  function paintLayer(colors, { stars = true, glow = true, baseOnly = false, direction = 'down' } = {}){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const rect = preview.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const w = rect.width, h = rect.height;

    const vectors = {
      up:[0,h,0,0],
      'up-right':[0,h,w,0],
      right:[0,0,w,0],
      'down-right':[0,0,w,h],
      down:[0,0,0,h],
      'down-left':[w,0,0,h],
      left:[w,0,0,0],
      'up-left':[w,h,0,0]
    };
    const [x0,y0,x1,y1] = vectors[direction] || vectors.down;
    const g = ctx.createLinearGradient(x0,y0,x1,y1);
    if (colors.length === 1){
      g.addColorStop(0, colors[0]);
      g.addColorStop(1, colors[0]);
    } else if (colors.length === 2){
      g.addColorStop(0, colors[0]);
      g.addColorStop(1, colors[1]);
    } else {
      g.addColorStop(0, colors[0]);
      g.addColorStop(.58, colors[1]);
      g.addColorStop(1, colors[2]);
    }
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);

    if (glow && !baseOnly){
      const glowGrad = ctx.createRadialGradient(w*.55,h*.98,0,w*.55,h*.98,w*.85);
      glowGrad.addColorStop(0,'rgba(47,137,199,.32)');
      glowGrad.addColorStop(.55,'rgba(26,79,137,.10)');
      glowGrad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0,0,w,h);
    }

    if (stars && !baseOnly){
      const seed = colors.join('').split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0) + 727;
      const rand = mulberry32(seed);
      const count = Math.round((w*h)/670);
      for(let i=0;i<count;i++){
        const x = rand()*w, y = rand()*h;
        const r = rand() < .88 ? rand()*.75+.18 : rand()*1.15+.45;
        const alpha = .18 + rand()*.72;
        ctx.beginPath();
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle = `rgba(${210+Math.floor(rand()*45)},${225+Math.floor(rand()*30)},255,${alpha})`;
        ctx.fill();
      }

      for(let i=0;i<18;i++){
        const x = rand()*w, y = h*.63+rand()*h*.35;
        const r = rand()*1.7+.8;
        ctx.save();
        ctx.translate(x,y);
        ctx.strokeStyle = `rgba(232,245,255,${.35+rand()*.55})`;
        ctx.lineWidth = .7;
        ctx.beginPath();
        ctx.moveTo(-r*2.4,0); ctx.lineTo(r*2.4,0);
        ctx.moveTo(0,-r*2.4); ctx.lineTo(0,r*2.4);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  function drawPresetDecoration(name){
    const rect = preview.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    const rand = mulberry32(name.split('').reduce((sum, ch) => sum + ch.charCodeAt(0), 0) + 991);

    if (name === 'paper' || name === 'parchment') {
      ctx.save();
      ctx.globalAlpha = name === 'paper' ? .16 : .22;
      for (let i=0; i<180; i++) {
        const x = rand()*w, y = rand()*h, len = 2 + rand()*9;
        ctx.strokeStyle = rand() > .5 ? 'rgba(115,92,57,.38)' : 'rgba(255,255,255,.28)';
        ctx.lineWidth = .35 + rand()*.4;
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x + len, y + (rand() - .5) * 2); ctx.stroke();
      }
      ctx.restore();
    }

    if (name === 'mist' || name === 'pearl') {
      ctx.save();
      ctx.fillStyle = name === 'mist' ? 'rgba(255,255,255,.15)' : 'rgba(255,255,255,.18)';
      for (let i=0; i<11; i++) {
        const x = rand()*w, y = h*(.12 + rand()*.55), r = 18 + rand()*40;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    if (name === 'forest') {
      ctx.save();
      const hill = (base, amp, color) => {
        ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(0,base);
        for (let x=0; x<=w; x+=16) ctx.lineTo(x, base - Math.sin(x / w * Math.PI * 2) * amp - rand()*10);
        ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
      };
      hill(h*.7, 15, 'rgba(7,39,31,.5)');
      hill(h*.8, 10, 'rgba(3,21,17,.82)');
      ctx.fillStyle = 'rgba(2,18,14,.82)';
      for (let i=0; i<18; i++) {
        const x = rand()*w, base = h*(.72 + rand()*.22), th = 18 + rand()*42;
        ctx.beginPath(); ctx.moveTo(x, base - th); ctx.lineTo(x - th*.24, base); ctx.lineTo(x + th*.24, base); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    if (name === 'meadow' || name === 'garden') {
      ctx.save();
      const hill = (base, amp, color, offset=0) => {
        ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(0,base);
        for (let x=0; x<=w; x+=18) ctx.lineTo(x, base - Math.sin((x / w) * Math.PI * 2 + offset) * amp - rand()*5);
        ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
      };
      hill(h*.72, 14, name === 'garden' ? 'rgba(115,122,101,.24)' : 'rgba(119,136,118,.26)', .7);
      hill(h*.82, 8, name === 'garden' ? 'rgba(75,81,72,.4)' : 'rgba(61,74,66,.42)', 1.4);
      if (name === 'garden') {
        ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = 1.2;
        for (let i=0; i<5; i++) {
          const x = w*(.08 + i*.2), y = h*(.83 + rand()*.06), len = 26 + rand()*24;
          ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(x+8,y-len*.45,x+3,y-len); ctx.stroke();
          for (let j=0; j<4; j++) { const ly=y-len*(.2+j*.17); ctx.beginPath(); ctx.ellipse(x+(j%2?6:-6),ly,6,3,j%2?.5:-.5,0,Math.PI*2); ctx.stroke(); }
        }
      }
      ctx.restore();
    }

    if (name === 'shore' || name === 'harbor' || name === 'dusklake') {
      ctx.save();
      ctx.strokeStyle = name === 'harbor' ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.16)';
      ctx.lineWidth = 1;
      const startY = name === 'dusklake' ? .58 : .52;
      for (let i=0; i<8; i++) {
        const y = h*(startY + i*.04);
        ctx.beginPath(); ctx.moveTo(0,y); ctx.bezierCurveTo(w*.25, y-4, w*.65, y+6, w, y-2); ctx.stroke();
      }
      ctx.fillStyle = name === 'shore' ? 'rgba(44,52,66,.55)' : name === 'harbor' ? 'rgba(33,38,50,.58)' : 'rgba(22,31,47,.5)';
      ctx.fillRect(0, h*.79, w, h*.21);
      const bx = w*(name==='shore' ? .68 : name==='harbor' ? .68 : .72), by = h*(name==='dusklake' ? .7 : .68);
      ctx.strokeStyle = 'rgba(255,255,255,.56)'; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx, by-26); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.34)'; ctx.beginPath(); ctx.moveTo(bx, by-26); ctx.lineTo(bx+18, by-12); ctx.lineTo(bx, by-12); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(29,34,44,.74)'; ctx.beginPath(); ctx.moveTo(bx-10,by); ctx.quadraticCurveTo(bx+2, by+5, bx+14, by); ctx.lineTo(bx+2, by+4); ctx.closePath(); ctx.fill();
      if (name === 'dusklake') {
        const glow = ctx.createRadialGradient(w*.22,h*.18,0,w*.22,h*.18,w*.55);
        glow.addColorStop(0,'rgba(255,226,195,.2)'); glow.addColorStop(1,'rgba(255,226,195,0)');
        ctx.fillStyle = glow; ctx.fillRect(0,0,w,h);
      }
      ctx.restore();
    }

    if (name === 'butterfly') {
      ctx.save();
      for (let i=0; i<9; i++) {
        const x = w*(.12 + rand()*.76), y = h*(.18 + rand()*.58), s = 6 + rand()*7, rot = rand()*Math.PI;
        ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
        ctx.fillStyle = `rgba(255,255,255,${.12 + rand()*.16})`;
        ctx.beginPath(); ctx.ellipse(-s*.45, 0, s*.7, s*.45, .6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*.45, 0, s*.7, s*.45, -.6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(92,91,117,.32)'; ctx.fillRect(-.5, -s*.5, 1, s);
        ctx.restore();
      }
      ctx.restore();
    }

    if (name === 'bubbles') {
      ctx.save();
      for (let i=0; i<22; i++) {
        const x = rand()*w, y = rand()*h, r = 4 + rand()*18;
        ctx.strokeStyle = `rgba(255,255,255,${.12 + rand()*.18})`; ctx.lineWidth = .8 + rand()*.5;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }

    if (name === 'dawn') {
      ctx.save();
      const x = w*.74, y = h*.24, r = w*.13;
      const sun = ctx.createRadialGradient(x,y,0,x,y,r*2.3);
      sun.addColorStop(0,'rgba(255,242,214,.44)'); sun.addColorStop(.4,'rgba(255,224,180,.18)'); sun.addColorStop(1,'rgba(255,224,180,0)');
      ctx.fillStyle = sun; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = 'rgba(255,243,218,.52)'; ctx.beginPath(); ctx.arc(x,y,r*.58,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    if (name === 'lavender') {
      ctx.save(); ctx.globalAlpha = .18;
      for (let i=0; i<12; i++) {
        const x = w*(.06 + i*.075), y = h*(.77 + rand()*.13);
        ctx.strokeStyle = 'rgba(72,52,106,.7)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x,h); ctx.lineTo(x,y); ctx.stroke();
        for (let j=0; j<6; j++) { ctx.fillStyle = 'rgba(240,230,255,.72)'; ctx.beginPath(); ctx.arc(x + (j%2?2:-2), y + j*4, 1.6, 0, Math.PI*2); ctx.fill(); }
      }
      ctx.restore();
    }

    if (name === 'sage') {
      ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.16)'; ctx.lineWidth = 1.2;
      for (let i=0; i<5; i++) {
        const x = w*(.1 + i*.19), y = h*(.82 + rand()*.08), len = 34 + rand()*28;
        ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(x+10, y-len*.4, x+4, y-len); ctx.stroke();
        for (let j=0; j<4; j++) { const ly = y - len*(.2 + j*.18); ctx.beginPath(); ctx.ellipse(x + (j%2?6:-6), ly, 7, 3.2, j%2? .5:-.5, 0, Math.PI*2); ctx.stroke(); }
      }
      ctx.restore();
    }

    if (name === 'moon') {
      ctx.save();
      const x = w*.75, y = h*.24, r = w*.11;
      ctx.fillStyle = 'rgba(239,243,252,.78)'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(167,177,202,.18)';
      for (let i=0; i<7; i++) { ctx.beginPath(); ctx.arc(x + (rand()-.5)*r*.9, y + (rand()-.5)*r*.9, 2 + rand()*5, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
    }

    if (name === 'blossom') {
      ctx.save();
      for (let i=0; i<24; i++) {
        const x = rand()*w, y = rand()*h, r = 2 + rand()*3.5;
        ctx.fillStyle = `rgba(255,${195 + Math.floor(rand()*30)},${210 + Math.floor(rand()*20)},${.16 + rand()*.16})`;
        ctx.beginPath(); ctx.ellipse(x, y, r, r*.55, rand()*Math.PI, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    if (name === 'rain') {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,.17)'; ctx.lineWidth = .9;
      for (let i=0; i<60; i++) { const x=rand()*w,y=rand()*h,len=8+rand()*18; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-3,y+len); ctx.stroke(); }
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      for (let i=0; i<10; i++) { const x=rand()*w,y=rand()*h,r=10+rand()*26; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }

    }

    if (name === 'firefly') {
      ctx.save();
      for (let i=0; i<28; i++) {

      for (let i=0; i<46; i++) {

  function drawBackground(){
    if (state.bgMode === 'image' && imageUrl){
      canvas.style.display = 'none';
      preview.style.backgroundImage = `url(${imageUrl})`;
      preview.style.backgroundPosition = imagePosition;
      preview.style.backgroundSize = 'cover';
      preview.style.backgroundRepeat = 'no-repeat';
      preview.style.backgroundColor = '#101010';
      return;
    }

    canvas.style.display = 'block';
    preview.style.backgroundImage = 'none';
    preview.style.backgroundPosition = 'center center';

    if (state.bgMode === 'preset'){
      paintLayer(presets[state.bg] || presets.mist, { stars:false, glow:false });
      drawPresetDecoration(state.bg);
    } else if (state.bgMode === 'gradient'){
      paintLayer(state.gradient, { stars:false, glow:false, direction:state.gradientDirection });
    } else if (state.bgMode === 'solid'){
      paintLayer([state.solid], { stars:false, glow:false, baseOnly:true });
    }
  }

  let previewTextLayoutFrame = 0;

  function layoutPreviewText(){
    const previewHeight = preview.clientHeight;
    const textHeight = text.offsetHeight;
    const minTop = Math.max(18, previewHeight * 0.045);
    const authorTop = authorEl.offsetTop;
    const bottomGap = Math.max(20, previewHeight * 0.04);
    const bottomLimit = Math.min(authorTop - bottomGap, previewHeight * 0.78);
    const targetCenter = previewHeight * 0.42;
    const maxTop = bottomLimit - textHeight;

    let nextTop = targetCenter - (textHeight / 2);
    if (maxTop >= minTop) {
      nextTop = Math.min(Math.max(nextTop, minTop), maxTop);
    } else {
      nextTop = minTop;
    }

    text.style.top = `${Math.round(nextTop)}px`;
  }

  function schedulePreviewTextLayout(){
    cancelAnimationFrame(previewTextLayoutFrame);
    previewTextLayoutFrame = requestAnimationFrame(() => {
      layoutPreviewText();
      requestAnimationFrame(layoutPreviewText);
    });
  }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function renderPreviewBlob(){
    const rect = preview.getBoundingClientRect();
    const width = Math.max(1, Math.round(rect.width));
    const height = Math.max(1, Math.round(rect.height));
    const scale = 2;
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = width * scale;
    exportCanvas.height = height * scale;
    const exportCtx = exportCanvas.getContext('2d');
    exportCtx.scale(scale, scale);

    if (state.bgMode === 'image' && imageUrl) {
      const img = await loadImage(imageUrl);
      const imgRatio = img.width / img.height;
      const frameRatio = width / height;
      const [xPct, yPct] = parsePositionPercent(imagePosition);
      let drawW, drawH, dx, dy;
      if (imgRatio > frameRatio) {
        drawH = height;
        drawW = drawH * imgRatio;
        dx = -Math.max(0, drawW - width) * xPct;
        dy = 0;
      } else {
        drawW = width;
        drawH = drawW / imgRatio;
        dx = 0;
        dy = -Math.max(0, drawH - height) * yPct;
      }
      exportCtx.drawImage(img, dx, dy, drawW, drawH);
    } else {
      exportCtx.drawImage(canvas, 0, 0, width, height);
    }

    const shadeColor = getComputedStyle(shade).backgroundColor;
    if (shadeColor && shadeColor !== 'rgba(0, 0, 0, 0)' && shadeColor !== 'transparent') {
      exportCtx.fillStyle = shadeColor;
      exportCtx.fillRect(0, 0, width, height);
    }

    function wrapCanvasText(rawText, maxWidth){
      const wrapped = [];
      const sourceLines = String(rawText || '').split('\n');
      const segmenter = typeof Intl !== 'undefined' && Intl.Segmenter
        ? new Intl.Segmenter('ko', { granularity:'grapheme' })
        : null;

      sourceLines.forEach(sourceLine => {
        if (sourceLine === '') {
          wrapped.push('');
          return;
        }
        const chars = segmenter
          ? Array.from(segmenter.segment(sourceLine), part => part.segment)
          : Array.from(sourceLine);
        let current = '';
        chars.forEach(char => {
          const candidate = current + char;
          if (current && exportCtx.measureText(candidate).width > maxWidth) {
            wrapped.push(current.replace(/\s+$/u, ''));
            current = char.replace(/^\s+/u, '');
          } else {
            current = candidate;
          }
        });
        wrapped.push(current);
      });
      return wrapped;
    }

    function drawTextBlock(el, wrapToElementWidth = false){
      const previewRect = preview.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      const cs = getComputedStyle(el);
      const x = elRect.left - previewRect.left;
      const y = elRect.top - previewRect.top;
      const blockWidth = elRect.width;
      const fontSize = parseFloat(cs.fontSize) || 16;
      const lineHeight = parseFloat(cs.lineHeight) || fontSize * 1.5;
      exportCtx.font = `${cs.fontStyle} ${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;
      exportCtx.fillStyle = cs.color;
      exportCtx.textBaseline = 'top';
      exportCtx.textAlign = cs.textAlign || 'left';
      exportCtx.shadowColor = 'transparent';
      exportCtx.shadowBlur = 0;
      exportCtx.shadowOffsetX = 0;
      exportCtx.shadowOffsetY = 0;

      const lines = wrapToElementWidth
        ? wrapCanvasText(el.textContent || '', Math.max(1, blockWidth - 1))
        : (el.textContent || '').split('\n');
      let drawX = x;
      if (cs.textAlign === 'center') drawX = x + blockWidth / 2;
      else if (cs.textAlign === 'right') drawX = x + blockWidth;
      lines.forEach((line, index) => exportCtx.fillText(line, drawX, y + lineHeight * index));
    }

    const excerptSegmentEls = text.querySelectorAll('.excerpt-segment');
    if (excerptSegmentEls.length) {
      excerptSegmentEls.forEach(segment => drawTextBlock(segment, true));
    } else {
      drawTextBlock(text, true);
    }
    drawTextBlock(authorEl);
    drawTextBlock(brandEl);

    return await new Promise((resolve, reject) => exportCanvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('png-render-failed')), 'image/png'));
  }

  async function savePreviewAsPng(){
    const blob = await renderPreviewBlob();
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = 'caveduck-card.png';
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('PNG로 저장했어요');
  }

  async function copyPreviewPng(){
    if (!(navigator.clipboard && window.ClipboardItem)) {
      throw new Error('clipboard-image-not-supported');
    }
    const pngPromise = renderPreviewBlob();
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngPromise })]);
    showToast('PNG 이미지를 복사했어요');
  }

  document.getElementById('cancel').addEventListener('click', () => showToast('편집을 취소했어요'));
  document.getElementById('share').addEventListener('click', openShareSheet);
  closeShareSheetButton.addEventListener('click', closeShareSheet);
  shareSheet.addEventListener('click', event => {
    if (event.target === shareSheet) closeShareSheet();
  });
  savePngButton.addEventListener('click', async() => {
    try {
      await savePreviewAsPng();
      closeShareSheet();
    } catch (err) {
      console.error(err);
      showToast('PNG 저장에 실패했어요');
    }
  });
  copyPngButton.addEventListener('click', async() => {
    try {
      await copyPreviewPng();
      closeShareSheet();
    } catch (err) {
      console.error(err);
      showToast('이미지 복사를 지원하지 않는 환경이에요');
    }
  });

  window.addEventListener('keydown', event => {
    if (event.key === 'Escape') closeShareSheet();
  });

  document.querySelectorAll('.dock-tab').forEach(button => {
    button.addEventListener('click', () => {
      const target = button.dataset.tab;
      document.querySelectorAll('.dock-tab').forEach(item => {
        const active = item === button;
        item.classList.toggle('active', active);
        item.setAttribute('aria-selected', String(active));
      });
      document.querySelectorAll('.dock-panel').forEach(panel => {
        panel.classList.toggle('active', panel.dataset.panel === target);
      });
      schedulePreviewTextLayout();
    });
  });

  window.addEventListener('resize', () => {
    drawBackground();
    schedulePreviewTextLayout();
  });

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(schedulePreviewTextLayout);
  }

  setChipBackgrounds();
  customTextColorLabel.style.background = customTextColor.value;
  renderBackgroundEditor();
  setActiveBackgroundButton(customBackgroundButton);
  setFont('batang');
  setSize(3);
  renderExcerpt();
  drawBackground();
  schedulePreviewTextLayout();
})();

</script>
</body>
</html>
